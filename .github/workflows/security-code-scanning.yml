name: security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build_mode: none
          - language: c-cpp
            build_mode: manual

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python
        if: matrix.language == 'c-cpp'
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build_mode }}
          dependency-caching: true
          config-file: ./.github/codeql/codeql-config.yml

      - name: Install native C/C++ toolchain for CodeQL
        if: matrix.language == 'c-cpp'
        run: |
          PREFIX="${RUNNER_TEMP}/ome-zarr-native-toolchain"
          ./scripts/install_latest_native_toolchain.sh "${PREFIX}"
          {
            echo "PATH=${PREFIX}/bin:${PATH}"
            echo "CMAKE_PREFIX_PATH=${PREFIX}"
            echo "LD_LIBRARY_PATH=${PREFIX}/lib:${PREFIX}/lib64:${LD_LIBRARY_PATH:-}"
          } >> "${GITHUB_ENV}"

      - name: Build native C/C++ targets for CodeQL
        if: matrix.language == 'c-cpp'
        run: |
          cmake -S . -B build-codeql -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}"
          cmake --build build-codeql -j2 --target \
            ome_zarr_native_selftest \
            ome_zarr_native_cli \
            ome_zarr_native_probe

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
